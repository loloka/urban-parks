name: urban-parks

services:
  # PHP-FPM — само приложение
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: up-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/99-urban-parks.ini:ro
    environment:
      PHP_IDE_CONFIG: serverName=urban-parks
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - urban-parks

  # Nginx — веб-сервер
  nginx:
    image: nginx:1.27-alpine
    container_name: up-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - urban-parks

  # MySQL 8 — база данных
  mysql:
    image: mysql:8.0
    container_name: up-mysql
    restart: unless-stopped
    ports:
      - "${FORWARD_DB_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-urban_parks}
      MYSQL_USER: ${DB_USERNAME:-urban_parks}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD:-root_secret}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - urban-parks

  # Обработчик очередей (email-уведомления, парсинг ADIF в фоне)
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: up-queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --tries=3 --timeout=120
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/99-urban-parks.ini:ro
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - urban-parks

  # Node/Vite — фронтенд-сборка с HMR (только для разработки)
  node:
    image: node:22-alpine
    container_name: up-node
    working_dir: /var/www/html
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - ./:/var/www/html
    networks:
      - urban-parks

networks:
  urban-parks:
    driver: bridge

volumes:
  mysql-data:
    driver: local
