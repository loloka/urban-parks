; Urban Parks — переопределения PHP
; Лимиты подобраны под загрузку ADIF-логов и фото-доказательств активаций

upload_max_filesize = 20M
post_max_size = 64M
max_file_uploads = 10

memory_limit = 512M
max_execution_time = 120

; Часовой пояс приложения — всё храним в UTC, отображаем локально
date.timezone = UTC

; Opcache для скорости. revalidate_freq=2 — изменения PHP-файлов
; подхватываются максимум через 2 секунды, зато нет stat() каждого
; файла на каждый запрос (критично на Windows-биндах)
opcache.enable = 1
opcache.memory_consumption = 192
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 2

; Кэш резолва путей — ещё один множитель скорости на медленной ФС
realpath_cache_size = 4096K
realpath_cache_ttl = 600
