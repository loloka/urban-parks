; Urban Parks — переопределения PHP
; Лимиты подобраны под загрузку ADIF-логов и фото-доказательств активаций

upload_max_filesize = 20M
post_max_size = 64M
max_file_uploads = 10

memory_limit = 512M
max_execution_time = 120

; Часовой пояс приложения — всё храним в UTC, отображаем локально
date.timezone = UTC

; Opcache для скорости (в dev revalidate на каждый запрос)
opcache.enable = 1
opcache.memory_consumption = 128
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
